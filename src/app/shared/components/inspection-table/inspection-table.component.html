<div *ngIf="isLoading" class="loading-overlay">
  <mat-spinner></mat-spinner>
</div>
<div class="table-container">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="srNo">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        SrNo.
      </th>
      <td mat-cell *matCellDef="let row; let i = index">
        {{ i + 1 + pageIndex * pageSize }}
      </td>
    </ng-container>

    <ng-container matColumnDef="sheetNumber">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        Sheet Number
      </th>
      <td mat-cell *matCellDef="let row">
        {{ row?.sheetNumber.split("_")[1] }}
      </td>
    </ng-container>

    <ng-container matColumnDef="operatorDefectTypes">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        Operator Defects
      </th>
      <td mat-cell *matCellDef="let row">
        <div
          class="truncate-text"
          [matTooltip]="row?.operatorDefectTypes || ''"
        >
          {{
            row?.operatorDefectTypes
              ? (row?.operatorDefectTypes | slice: 0 : 15)
              : "-"
          }}
          <span *ngIf="row?.operatorDefectTypes?.length > 15">...</span>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="sheetThickness">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        Sheet Thickness
      </th>
      <td mat-cell *matCellDef="let row">
        {{ row?.sheetThickness | number: "1.2-2" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="inspectionResult">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        Result
      </th>
      <td mat-cell *matCellDef="let row">
        <button
          *ngIf="row?.inspectionResult === 1"
          mat-flat-button
          style="background-color: #4caf50; color: white; height: 20px"
        >
          OK
        </button>
        <button
          *ngIf="row?.inspectionResult !== 1"
          mat-flat-button
          style="background-color: #f44336; color: white; height: 20px"
        >
          NG
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="imageProcessFlag">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="font-weight: bold; background-color: #f0f0f0"
      >
        View
      </th>
      <td mat-cell *matCellDef="let row">
        <button
          class="action-btn"
          [class.active-btn]="row?.imageProcessFlag === 1"
          [class.deactive-btn]="row?.imageProcessFlag === 0"
          [class.deactive-red-btn]="row?.imageProcessFlag === 2"
          [disabled]="row?.imageProcessFlag !== 1"
          (click)="openPopup(row)"
        >
          👁
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
<mat-paginator
  [length]="dataSource.data.length"
  [pageSize]="pageSize"
  [pageSizeOptions]="[6]"
  showFirstLastButtons
>
</mat-paginator>
