<mat-toolbar>
  <!-- Mobile Menu -->

  <button
    mat-icon-button
    (click)="toggleMobileNav.emit()"
    class="d-flex d-lg justify-content-center"
  >
    <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
  </button>
  <div class="topbarLogo">
    <img
      src="./assets/images/logos/motor.jpg"
      class="align-middle m-2"
      alt="logo"
      width="400"
      height="45px"
    />
  </div>
  <h3
    style="
      color: black;
      font-weight: bold;
      text-align: center;
      padding-left: 180px;
    "
  >
    Surface Inspection System
  </h3>

  <style>
    .topbarLogo {
      margin-left: 15px;
    }
    .bell {
      margin-right: 25px;
    }
    .blink-bell-fill {
      fill: red; /* Fill bell red */
      stroke: red; /* Also make outline red */
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    i-tabler.active {
      font-size: 28px;
      color: #fcfbfb; /* red when active */
      stroke: #f46e07; /* red outline */
      fill: #d32f2f; /* red fill */
    }

    /* target the badge content inside */
    .mat-badge-content,
    .mat-badge-active {
      background-color: #d32f2f !important; /* solid red */
      color: #ffffff !important;
      border: 1px solid #f46e07 !important; /* white text */
    }

    .error-snackbar {
      background-color: #f44336; /* Red */
      color: white;
    }
  </style>

  <span class="flex-1-auto"></span>

  <!-- --------------------------------------------------------------- -->
  <!-- profile Dropdown -->
  <!-- --------------------------------------------------------------- -->
  <button
    class="bell"
    mat-icon-button
    (click)="openNotifications()"
    aria-label="Notifications"
  >
    <i-tabler
      name="bell"
      [class.active]="unreadCount > 0"
      matBadge="{{ unreadCount }}"
      matBadgeClass="custom-badge"
      [ngClass]="{ 'blink-bell-fill': unreadCount > 0 }"
    ></i-tabler>
  </button>

  <!-- <button class="bell" mat-icon-button (click)="openNotifications()" aria-label="Notifications">
    <i-tabler class="d-flex " name="bell" matBadge={{unreadCount}} matBadgeColor="primary"  [ngClass]="{ 'blink-bell-fill': unreadCount > 0 }"
      
      ></i-tabler>
  </button> -->
  <mat-menu #menu="matMenu"> </mat-menu>

  <button
    mat-mini-fab
    [matMenuTriggerFor]="profilemenu"
    aria-label="Notifications"
  >
    <img
      src="./assets/images/profile/user-1.jpg"
      class="rounded-circle object-cover d-block"
      width="35"
    />
  </button>
  <mat-menu #profilemenu="matMenu" class="cardWithShadow topbar-dd">
    <button mat-menu-item>
      <mat-icon class="d-flex align-items-center"
        ><i-tabler name="user" class="icon-18 d-flex"></i-tabler></mat-icon
      >My Profile
    </button>
    <button mat-menu-item>
      <mat-icon class="d-flex align-items-center"
        ><i-tabler name="mail" class="icon-18 d-flex"></i-tabler></mat-icon
      >My Account
    </button>
    <button mat-menu-item>
      <mat-icon class="d-flex align-items-center"
        ><i-tabler
          name="list-check"
          class="icon-18 d-flex"
        ></i-tabler></mat-icon
      >My Task
    </button>

    <div class="p-x-12 m-t-12">
      <a (click)="logout()" mat-stroked-button class="w-100">Logout</a>
    </div>
  </mat-menu>
</mat-toolbar>
